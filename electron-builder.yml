appId: com.minchbingo.app
productName: Minch Bingo
directories:
  output: release
  buildResources: public
files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
extraResources: []
asarUnpack:
  - node_modules/better-sqlite3/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: public/icons/icon.ico  # add a .ico file here for custom Windows icon
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Minch Bingo
