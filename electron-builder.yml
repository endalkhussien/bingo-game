appId: com.tebibbingo.app
productName: TEBIB-Bingo
# Electron 22 — last major version supporting Windows 8 / 8.1
electronVersion: 22.3.27
directories:
  output: release
  buildResources: public
files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
extraResources: []
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - out/sounds/**
  - out/audio/**
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: brand/icon.ico
  signAndEditExecutable: false

nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TEBIB-Bingo
  uninstallDisplayName: TEBIB-Bingo
  include: build/installer.nsh

portable:
  artifactName: ${productName}-Portable-${version}.${ext}
