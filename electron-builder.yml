appId: com.tebibbingo.app
productName: TEBIB-Bingo
directories:
  output: release
  buildResources: public
files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
extraResources: []
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - out/sounds/**
  - out/audio/**
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: TEBIB-Bingo-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TEBIB-Bingo
  uninstallDisplayName: TEBIB-Bingo
