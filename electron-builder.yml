appId: com.waliya.app
productName: Waliya
# Electron 22 — last major version supporting Windows 8 / 8.1
electronVersion: 22.3.27
directories:
  output: release
  buildResources: public
files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
extraResources: []
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
  - out/sounds/**
  - out/audio/**

npmRebuild: true
buildDependenciesFromSource: false
win:
  # 64-bit only — Windows 8, 8.1, 10, and 11 (Electron 22 does not support 32-bit shops)
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: brand/icon.ico
  signAndEditExecutable: false

nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Waliya
  uninstallDisplayName: Waliya
  include: build/installer.nsh

portable:
  artifactName: ${productName}-Portable-${version}.${ext}
