appId: com.waliya.app
productName: Waliya
# Electron 22 — last major version supporting Windows 8 / 8.1
electronVersion: 22.3.27
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
extraResources:
  - from: public/brand/icon.ico
    to: brand/icon.ico
  - from: public/brand/icon.png
    to: brand/icon.png
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
  - out/audio/**

npmRebuild: true
buildDependenciesFromSource: false
# Local/CI builds only produce release/*.exe — no GitHub publish (avoids GH_TOKEN requirement in Actions)
publish: null
win:
  # 64-bit only — Windows 8, 8.1, 10, and 11 (Electron 22 does not support 32-bit shops)
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: icon.ico
  sign: null
  signDlls: false
  verifyUpdateCodeSignature: false
  # Avoid winCodeSign cache extract (symlink privilege error on Windows without Developer Mode).
  # Icon is embedded via scripts/after-pack-win-icon.cjs using rcedit instead.
  signAndEditExecutable: false

afterPack: scripts/after-pack-win-icon.cjs

nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerHeaderIcon: icon.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Waliya
  uninstallDisplayName: Waliya
  include: build/installer.nsh

portable:
  artifactName: ${productName}-Portable-${version}.${ext}
